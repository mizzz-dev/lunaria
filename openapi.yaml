  /guilds/{guildId}/config-versions/{versionId}/rollback:
    post:
      tags: [config-versions]
      summary: 指定バージョンへロールバック
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: path
          name: versionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ロールバック成功

  # ---- Memberships ----
  /guilds/{guildId}/memberships:
    get:
      tags: [memberships]
      summary: メンバー一覧
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
      responses:
        '200':
          description: メンバー一覧

  /guilds/{guildId}/memberships/{membershipId}:
    get:
      tags: [memberships]
      summary: メンバー詳細
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: path
          name: membershipId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: メンバー詳細
    patch:
      tags: [memberships]
      summary: メンバーに RBAC ロールを割り当て
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: path
          name: membershipId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds]
              properties:
                roleIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 更新後の割り当て

  # ---- Roles ----
  /guilds/{guildId}/roles:
    get:
      tags: [roles]
      summary: RBAC ロール一覧（システムロール含む）
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ロール一覧
    post:
      tags: [roles]
      summary: カスタムロールを作成
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                permissionKeys:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 作成されたロール

  /guilds/{guildId}/roles/{roleId}:
    patch:
      tags: [roles]
      summary: ロールを更新（システムロール不可）
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: path
          name: roleId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                permissionKeys:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 更新後のロール
    delete:
      tags: [roles]
      summary: ロールを削除（システムロール不可）
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: path
          name: roleId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 削除成功

  # ---- Templates ----
  /templates:
    get:
      tags: [templates]
      summary: 公開テンプレート一覧
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
      responses:
        '200':
          description: テンプレート一覧

  /guilds/{guildId}/templates:
    post:
      tags: [templates]
      summary: ギルドプライベートテンプレートを作成
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category, body, visibility]
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                  enum: [rule, auto_response, poll, event, faq, moderation]
                body:
                  type: object
                visibility:
                  type: string
                  enum: [official, community, private]
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 作成されたテンプレート

  /guilds/{guildId}/templates/{templateId}/apply:
    post:
      tags: [templates]
      summary: テンプレートを適用
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: path
          name: templateId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 適用結果
