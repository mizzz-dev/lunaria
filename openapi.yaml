          schema:
            type: string
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新後のジョブ

  /guilds/{guildId}/daily-content/runs:
    get:
      tags: [daily-content]
      summary: 実行履歴一覧
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 実行履歴

  # ---- Moderation ----
  /guilds/{guildId}/moderation/rules:
    get:
      tags: [moderation]
      summary: モデレーションルール一覧
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ルール一覧
    post:
      tags: [moderation]
      summary: モデレーションルールを作成
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, ruleType, action]
              properties:
                name:
                  type: string
                ruleType:
                  type: string
                  enum: [spam, banned_word, link_filter, mention_spam, caps_abuse, duplicate_message]
                action:
                  type: string
                  enum: [warn, mute, kick, ban, delete, log]
                config:
                  type: object
                actionConfig:
                  type: object
      responses:
        '201':
          description: 作成されたルール

  /guilds/{guildId}/moderation/actions:
    get:
      tags: [moderation]
      summary: モデレーションアクション履歴
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: query
          name: targetId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
      responses:
        '200':
          description: アクション一覧
    post:
      tags: [moderation]
      summary: モデレーションアクションを手動実行
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetId, actionType]
              properties:
                targetId:
                  type: string
                actionType:
                  type: string
                  enum: [warn, mute, kick, ban, unmute, unban]
                reason:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: 実行されたアクション

  # ---- Analytics ----
  /guilds/{guildId}/analytics/summary:
    get:
      tags: [analytics]
