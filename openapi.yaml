  /guilds/{guildId}/audit-logs:
    get:
      tags: [audit-logs]
      summary: 監査ログ一覧（ページネーション）
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: actorId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
      responses:
