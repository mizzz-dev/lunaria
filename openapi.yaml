          name: guildId
          required: true
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: サマリー統計

  /guilds/{guildId}/analytics/daily:
    get:
      tags: [analytics]
      summary: 日別アナリティクス
      parameters:
        - in: path
          name: guildId
          required: true
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 日別データ

